<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Quote</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.2/semantic.min.css">
    <style>
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .quote-container {
            text-align: center;
            padding: 20px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .quote {
            font-size: 24px;
            font-style: italic;
            margin-bottom: 20px;
        }

        .author {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="quote-container">
        <div class="quote">
            "Adventure is worthwhile in itself."
        </div>
        <div class="author">
            - Amelia Earhart
        </div>
    </div>

    <script>
        // Function to update the countdown and redirect
        function countdown() {
            const countdownElement = document.getElementById('countdown');
            let seconds = 5; // Set the countdown duration in seconds

            function updateCountdown() {
                countdownElement.innerText = seconds;
                if (seconds === 0) {
                    window.location.href = 'https://www.google.com'; // Redirect to Google
                } else {
                    seconds--;
                    setTimeout(updateCountdown, 1000); // Update countdown every second
                }
            }

            updateCountdown();
        }
    </script>
</body>
</html>
