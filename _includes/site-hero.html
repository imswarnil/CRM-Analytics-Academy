<!-- Hero Section -->
<section class="hero is-small is-primary box my-5">
    <div class="hero-body">
      <div class="container">
        <div class="columns is-vcentered">
          
          <!-- Left Column: Title, Subtitle, Breadcrumb -->
          <div class="column is-12">
            <!-- Breadcrumb Section -->
            <nav class="breadcrumb has-arrow-separator" aria-label="breadcrumbs">
              <ul>
                <li><a href="/"><span class="icon"><i class="fas fa-home"></i></span> Home</a></li>
                <li><a href="/blog/"><span class="icon"><i class="fas fa-book"></i></span> Blog</a></li>
                <li class="is-active"><a href="#" aria-current="page"><span class="icon"><i class="fas fa-file-alt"></i></span> {{ page.title }}</a></li>
              </ul>
            </nav>
            
            <!-- Title and Subtitle -->
            <h1 class="title is-2">{{ page.title }}</h1>
            <p class="subtitle is-3">{{ page.subtitle }}</p>
          </div>
  
          <!-- Right Column: Video, Image, or Ad Space -->
          <div class="column is-12">
            <!-- Conditional Rendering for Video, Image, or Ad -->
            
            {% if page.video_url %}
            <!-- Video Section -->
            <div class="video-container">
              <iframe width="100%" height="400" src="{{ page.video_url }}" frameborder="0" allowfullscreen></iframe>
            </div>
            
            {% elsif page.hero_image %}
            <!-- Image Section -->
            <div class="image-container">
              <img src="{{ page.hero_image }}" alt="Hero Image" class="image is-4by3">
            </div>
            
            {% else %}
            <!-- Ad Section (e.g., Google AdSense) -->
            <div style="width:100%; height: 90px; border: 1px dashed #ccc; background-color: #f5f5f5; text-align: center;">
              <p class="has-text-grey">Your ad content goes here.</p>
              <!-- Example: AdSense iframe -->
              <!-- <iframe src="https://example.com/ad" width="100%" height="90px"></iframe> -->
            </div>
            {% endif %}
          </div>
  
        </div>
      </div>
    </div>
  </section>
