<section class="section">
  <div class="container">
    
    <!-- Header Section with Floating Button -->
    <div class="columns is-vcentered is-mobile">
      <div class="column">
        <h2 class="title is-3 has-text-primary">CRM Analytics</h2>
        <p class="subtitle is-5">What do you want to learn?</p>
      </div>
      <div class="column is-narrow">
        <a href="#" class="button is-primary is-outlined">
          <span class="icon"><i class="fas fa-random"></i></span>
          <span>Learn Something New</span>
        </a>
      </div>
    </div>

    <!-- Skills Grid -->
    <div class="columns is-multiline">
      {% for skill in include.skill-cards %}
      <div class="column is-half-mobile is-half-tablet is-one-quarter-desktop">
        <a href="{{ skill.url }}" class="home-skills-card is-flex is-align-items-center is-gap-3">
          <span class="icon is-large has-text-primary"><i class="{{ skill.icon }}"></i></span>
          <div>
            <p class="title is-5 has-text-primary">{{ skill.title }}</p>
            <p class="subtitle is-6">{{ skill.description }}</p>
          </div>
        </a>
      </div>
      {% endfor %}
    </div>

  </div>
</section>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".home-skills-card").forEach((card, index) => {
      card.style.opacity = "0";
      card.style.transform = "translateY(20px)";
      card.style.transition = "opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)";
      
      setTimeout(() => {
        card.style.opacity = "1";
        card.style.transform = "translateY(0)";
      }, index * 150);
    });
  });
</script>
<style>
  .home-skills-card {
  border: 2px solid var(--bulma-primary);
  border-radius: 8px;
  padding: 12px;
  transition: background-color 0.3s ease, transform 0.2s ease-in-out;

  &:hover {
    background-color: var(--bulma-primary-light);
    transform: scale(1.05);
  }
}

</style>
