<section class="section">
  <div class="container">
    
    <!-- Header Section with Floating Button -->
    <div class="columns is-vcentered is-mobile">
      <div class="column">
        <h2 class="title is-3 has-text-primary">CRM Analytics</h2>
        <p class="subtitle is-5">What do you want to learn?</p>
      </div>
      <div class="column is-narrow">
        <a href="/random" class="button is-primary is-outlined">
          <span class="icon"><i class="fas fa-random"></i></span>
          <span>Learn Something New</span>
        </a>
      </div>
    </div>

    <!-- Cards Grid -->
    <div class="columns is-multiline">
      {% for skill in include.skill-cards %}
      <div class="column is-half-mobile is-half-tablet is-one-quarter-desktop">
        <a href="{{ skill.url }}" class="box has-background-light has-text-dark is-flex is-align-items-center is-gap-3 has-border has-radius fade-in">
          <span class="icon is-large has-text-primary"><i class="{{ skill.icon }}"></i></span>
          <div>
            <p class="title is-5 has-text-primary">{{ skill.title }}</p>
            <p class="subtitle is-6">{{ skill.description }}</p>
          </div>
        </a>
      </div>
      {% endfor %}
    </div>
    
  </div>
</section>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".fade-in").forEach((card, index) => {
      card.style.opacity = "0";
      card.style.transform = "translateY(20px)";
      card.style.transition = "opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)";
      
      setTimeout(() => {
        card.style.opacity = "1";
        card.style.transform = "translateY(0)";
      }, index * 150);
    });

    // Random post redirection
    document.querySelector(".button.is-outlined").addEventListener("click", function(event) {
      event.preventDefault();
      fetch("/sitemap.xml") 
        .then(response => response.text())
        .then(data => {
          let parser = new DOMParser();
          let xml = parser.parseFromString(data, "text/xml");
          let urls = Array.from(xml.querySelectorAll("url loc")).map(loc => loc.textContent);
          let randomUrl = urls[Math.floor(Math.random() * urls.length)];
          window.location.href = randomUrl;
        })
        .catch(() => window.location.href = "/blog");
    });
  });
</script>
