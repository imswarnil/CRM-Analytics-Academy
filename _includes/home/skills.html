<section class="section">
  <div class="container">
    <!-- Heading -->
    <div class="block">
      <h2 class="title is-4 has-text-primary">CRM Analytics</h2>
      <p class="subtitle is-6">What do you want to learn?</p>
    </div>

    <!-- Cards -->
    <div class="columns is-multiline">
      {% for skill in include.skill-cards %}
      <div class="column is-half-mobile is-half-tablet is-one-quarter-desktop">
        <a href="{{ skill.url }}" class="box has-background-light has-text-dark is-flex is-align-items-center is-gap-3 has-border has-radius fade-in">
          <span class="icon is-large has-text-primary"><i class="{{ skill.icon }}"></i></span>
          <div>
            <p class="title is-6 has-text-primary">{{ skill.title }}</p>
            <p class="subtitle is-7">{{ skill.description }}</p>
          </div>
        </a>
      </div>
      {% endfor %}
    </div>

    <!-- Floating Random Post Button -->
    <a href="/random" class="button is-primary is-medium floating-button">
      <span class="icon"><i class="fas fa-random"></i></span>
      <span>Learn Something New</span>
    </a>
  </div>
</section>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".fade-in").forEach((card, index) => {
      card.style.opacity = "0";
      card.style.transform = "translateY(20px)";
      card.style.transition = "opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)";
      
      setTimeout(() => {
        card.style.opacity = "1";
        card.style.transform = "translateY(0)";
      }, index * 150);
    });

    // Random post redirection
    document.querySelector(".floating-button").addEventListener("click", function(event) {
      event.preventDefault();
      fetch("/sitemap.xml") // Assuming you have a sitemap
        .then(response => response.text())
        .then(data => {
          let parser = new DOMParser();
          let xml = parser.parseFromString(data, "text/xml");
          let urls = Array.from(xml.querySelectorAll("url loc")).map(loc => loc.textContent);
          let randomUrl = urls[Math.floor(Math.random() * urls.length)];
          window.location.href = randomUrl;
        })
        .catch(() => window.location.href = "/blog");
    });
  });
</script>

<style>
  /* Floating button styling */
  .floating-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    border-radius: 50px;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
</style>
