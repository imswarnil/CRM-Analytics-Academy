<div class="skill-card-home-container">
    {% for card in include.cards %}
    <a href="{{ card.url }}" class="skill-card-home">
      <span class="skill-card-home-icon"><i class="{{ card.icon }}"></i></span>
      <div class="skill-card-home-content">
        <div class="skill-card-home-title">{{ card.title }}</div>
        <div class="skill-card-home-desc">{{ card.description }}</div>
      </div>
    </a>
    {% endfor %}
  </div>
  
  <style>
    .skill-card-home-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
    }
  
    .skill-card-home {
      display: flex;
      align-items: center;
      border: 2px solid #ddd;
      padding: 1rem;
      border-radius: 8px;
      transition: transform 0.3s ease-in-out, background-color 0.3s ease-in-out;
      opacity: 0;
      transform: translateY(20px);
      text-decoration: none;
      color: inherit;
    }
  
    .skill-card-home:hover {
      background-color: #f8f8f8;
      transform: scale(1.05);
    }
  
    .skill-card-home.fade-in {
      opacity: 1;
      transform: translateY(0);
    }
  
    .skill-card-home-icon {
      font-size: 2rem;
      margin-right: 10px;
      color: #3273dc;
    }
  
    .skill-card-home-title {
      font-size: 1.2rem;
      font-weight: bold;
    }
  
    .skill-card-home-desc {
      font-size: 0.9rem;
      color: #666;
    }
  
    @media (max-width: 768px) {
      .skill-card-home-container {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
  
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll(".skill-card-home").forEach((card, index) => {
        setTimeout(() => {
          card.classList.add("fade-in");
        }, index * 150);
      });
    });
  </script>
