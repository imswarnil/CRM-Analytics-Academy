

 <style>
        /* Square Ad Modal */
        .modal {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .modal.is-active {
            display: flex;
            opacity: 1;
        }

        /* Sliding Leaderboard Ad */
        .ad-slide-in {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 728px;
            background: white;
            box-shadow: 0px -2px 10px rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 10px 10px 0 0;
            text-align: center;
            transition: bottom 0.5s ease-in-out;
            z-index: 1000;
        }

        .ad-slide-in.show {
            bottom: 0;
        }
    </style>


    <!-- Square Ad Modal -->
    <div id="square-ad-modal" class="modal">
        <div class="modal-background"></div>
        <div class="modal-content box has-text-centered">
            <h2 class="title is-5">Sponsored Ad</h2>
            <p>{% adsense square %}</p>
            <button class="button is-danger mt-3" id="close-square-ad">Close Ad</button>
        </div>
    </div>

    <!-- Sliding Leaderboard Ad -->
    <div id="leaderboard-ad" class="ad-slide-in">
        <p>{% adsense large-leaderboard %}</p>
    </div>

    <script>
        // Square Ad Modal Logic
        function showSquareAd() {
            let modal = document.getElementById("square-ad-modal");
            modal.classList.add("is-active");

            // Close Button
            document.getElementById("close-square-ad").onclick = function() {
                modal.classList.remove("is-active");
            };
        }

        // Show the square ad every 5 seconds
        setInterval(showSquareAd, 5000);

        // Sliding Leaderboard Ad Logic
        function showLeaderboardAd() {
            let ad = document.getElementById("leaderboard-ad");
            ad.classList.add("show");

            // Auto-hide after 7 seconds
            setTimeout(() => {
                ad.classList.remove("show");
            }, 7000);
        }

        // Show the leaderboard ad every 10 seconds
        setInterval(showLeaderboardAd, 10000);
    </script>
