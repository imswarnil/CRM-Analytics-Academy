{% if site.ads.enable %}
  <div class="ad-container box has-text-centered {{ site.ads.types[include.type].style }}">
    <h4 class="subtitle">Ad Type: {{ include.type | capitalize }}</h4>
    <div class="ad-placeholder" 
         data-ad-client="{{ site.ads.client }}" 
         data-ad-slot="{{ site.ads.types[include.type].slot }}" 
         style="margin-bottom: 15px;">
      <!-- Placeholder for lazy-loaded ad -->
      <ins class="adsbygoogle" 
           style="display:block" 
           data-ad-client="{{ site.ads.client }}" 
           data-ad-slot="{{ site.ads.types[include.type].slot }}">
      </ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>
  </div>
{% endif %}
<style>
    .ad-container {
  margin-bottom: 20px;
  padding: 15px;
  border: 2px solid #ddd;
  border-radius: 8px;
}

.ad-container .subtitle {
  font-size: 1.2rem;
  color: #333;
}

.ad-placeholder {
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f7f7f7;
  height: auto;
  width: 100%;
}

@media (max-width: 768px) {
  .ad-container {
    padding: 10px;
    margin-bottom: 15px;
  }
}

</style>
