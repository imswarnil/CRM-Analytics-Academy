{% if site.ads.enable %}
  <div class="ad-container box has-text-centered"
       data-ad-client="{{ site.ads.client }}"
       data-ad-slot="{{ site.ads.types[include.type].slot }}"
       data-ad-style="{{ site.ads.types[include.type].style }}">
    <div class="ad-placeholder">
      <p>Loading ad...</p>
      <span class="icon is-large">
        <i class="fas fa-ad fa-2x"></i>
      </span>
    </div>
  </div>
{% endif %}
