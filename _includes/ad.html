{% if site.ads.enable %}
  <div class="ad-container has-text-centered" style="margin: 20px 0;">
    {% assign ad_type = include.type %}
    
    {% if site.ads.types[ad_type] %}
      <div class="ad-placeholder" 
           data-ad-client="{{ site.ads.client }}" 
           data-ad-slot="{{ site.ads.types[ad_type].slot }}"
           style="{{ site.ads.types[ad_type].style }}">
        <!-- Lazy Loaded Ad will be inserted here -->
      </div>
    {% else %}
      <p>Ad type "{{ ad_type }}" not found in config.</p>
    {% endif %}
  </div>
{% endif %}
