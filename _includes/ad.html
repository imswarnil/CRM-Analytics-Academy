{% if site.ads.enable %}
<div class="ad-placeholder has-text-centered box is-flex is-justify-content-center is-align-items-center"
     style="height: {{ site.ads.types[include.type].height }}; width: {{ site.ads.types[include.type].width }};">
  <div>
    <span class="icon is-large">
      <i class="fas fa-ad fa-2x"></i>
    </span>
    <p class="has-text-grey-light">Loading ad...</p>
  </div>
</div>

<div class="ad-container"
     data-ad-client="{{ site.ads.client }}"
     data-ad-slot="{{ site.ads.types[include.type].slot }}"
     data-ad-style="{{ site.ads.types[include.type].style }}"
     data-ad-format="{{ site.ads.types[include.type].format | default: '' }}"
     data-ad-layout="{{ site.ads.types[include.type].layout | default: '' }}"
     style="display:none;">
</div>
{% endif %}
