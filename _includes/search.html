<section class="section">
  <div class="container">
    <div class="columns is-multiline">
      
      <!-- Search Section -->
      <div class="column is-8">
        <div class="box has-shadow">
          <form id="search-form">
            <div class="field has-addons">
              <div class="control has-icons-left is-expanded">
                <input
                  class="input is-medium"
                  id="search"
                  type="search"
                  name="search"
                  placeholder="Search for content..."
                  autocomplete="off"
                />
                <span class="icon is-left">
                  <i class="fas fa-search"></i>
                </span>
              </div>
              <div class="control">
                <button type="button" class="button is-medium is-primary">
                  Search
                </button>
              </div>
            </div>
            <div class="field">
              <ul class="list" id="list">
                <!-- Search results -->
              </ul>
            </div>
          </form>
        </div>
      </div>

      <!-- Ad Placeholder 1 -->
      <div class="column is-4">
        <div class="box has-text-centered">
          <p class="has-text-grey">[Ad Space 1]</p>
        </div>
      </div>

      <!-- Ad Placeholder 2 -->
      <div class="column is-4">
        <div class="box has-text-centered">
          <p class="has-text-grey">[Ad Space 2]</p>
        </div>
      </div>

      <!-- Navigation / Sitemap -->
      <div class="column is-8">
        <div class="box">
          <h2 class="title is-5">Navigation</h2>
          <ul>
            {% for page in site.pages %}
              {% if page.title %}
                <li><a href="{{ page.url | relative_url }}">{{ page.title }}</a></li>
              {% endif %}
            {% endfor %}
          </ul>
        </div>
      </div>

      <!-- Ad Placeholder 3 -->
      <div class="column is-12">
        <div class="box has-text-centered">
          <p class="has-text-grey">[Ad Space 3]</p>
        </div>
      </div>

    </div>
  </div>
</section>

<script type="text/javascript" src="{{ '/assets/scripts/fetch.js' | relative_url }}"></script>
<script type="text/javascript">
  const endpoint = '{{ "/assets/search.json" | relative_url }}';
  const pages = [];

  fetch(endpoint)
    .then((response) => response.json())
    .then((data) => pages.push(...data));

  function findResults(termToMatch, pages) {
    return pages.filter((item) => {
      const regex = new RegExp(termToMatch, 'gi');
      return item.title.match(regex) || item.content.match(regex);
    });
  }

  function displayResults() {
    const term = this.value;
    const resultsArray = findResults(term, pages);
    const html = resultsArray
      .map(
        (item) => `
          <li class="item item--result">
            <article class="media box">
              <figure class="media-left">
                <p class="image is-64x64">
                  <img src="${item.image}" alt="${item.title}" />
                </p>
              </figure>
              <div class="media-content">
                <h4 class="title is-5">
                  <a href="${item.url}" class="has-text-link">${item.title}</a>
                </h4>
                <p class="content">${item.description}</p>
              </div>
            </article>
          </li>`
      )
      .join('');

    resultsList.innerHTML =
      resultsArray.length === 0 || term === ''
        ? '<p class="has-text-centered has-text-grey">Sorry, nothing was found</p>'
        : html;
  }

  const field = document.querySelector('#search');
  const resultsList = document.querySelector('#list');

  field.addEventListener('keyup', displayResults);
  field.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
    }
  });
</script>

<noscript>Please enable JavaScript to use the search form.</noscript>
