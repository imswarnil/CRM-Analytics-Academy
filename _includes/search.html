<section class="section">
  <div class="container">
    <!-- Search Form Section -->
    <div class="box has-shadow p-5">
      <form id="search-form">
        <!-- Search Input Field -->
        <div class="field has-addons">
          <div class="control has-icons-left is-expanded">
            <input
              class="input is-medium is-rounded"
              id="search"
              type="search"
              name="search"
              placeholder="Search for content..."
              autocomplete="off"
            />
            <span class="icon is-left">
              <i class="fas fa-search"></i>
            </span>
          </div>
          <div class="control">
            <button type="button" class="button is-medium is-primary is-rounded">
              Search
            </button>
          </div>
        </div>

        <!-- Results List -->
        <div class="field mt-4">
          <div class="bento-grid" id="list">
            <!-- Results will be dynamically rendered here -->
          </div>
        </div>
      </form>
    </div>
  </div>
</section>

<script type="text/javascript">
  const endpoint = '{{ "/assets/search.json" | relative_url }}';
  const pages = [];

  fetch(endpoint)
    .then((response) => response.json())
    .then((data) => pages.push(...data));

  function findResults(termToMatch, pages) {
    return pages.filter((item) => {
      const regex = new RegExp(termToMatch, 'gi');
      return item.title.match(regex) || item.content.match(regex);
    });
  }

  function displayResults() {
    const term = this.value;
    const resultsArray = findResults(term, pages);
    const html = resultsArray
      .map(
        (item) => `
          <div class="bento-item box">
            <figure class="image is-128x128">
              <img src="${item.image}" alt="${item.title}" class="bento-img"/>
            </figure>
            <div class="content">
              <h4 class="title is-5">
                <a href="${item.url}" class="has-text-link">${item.title}</a>
              </h4>
              <p>${item.description}</p>
            </div>
          </div>`
      )
      .join('');

    resultsList.innerHTML =
      resultsArray.length === 0 || term === ''
        ? '<p class="has-text-centered has-text-grey">No results found</p>'
        : html;
  }

  const field = document.querySelector('#search');
  const resultsList = document.querySelector('#list');

  field.addEventListener('keyup', displayResults);
  field.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
    }
  });
</script>

<style>
  /* Bento Grid Layout */
  .bento-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 16px;
  }

  .bento-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px;
    border-radius: 10px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .bento-item:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
  }

  .bento-img {
    border-radius: 10px;
    width: 100px;
    height: 100px;
    object-fit: cover;
  }

  .title {
    text-align: center;
  }
</style>
