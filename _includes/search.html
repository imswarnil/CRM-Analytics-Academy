  <!-- Hero Section -->
  <section class="hero is-medium is-light">
    <div class="hero-body">
      <div class="container">
        <h2 class="subtitle has-text-centered">
          Search hundreds of resources and tutorials for mastering CRM Analytics.
        </h2>
        <h1 class="title is-size-2 has-text-centered">Find What You’re Looking For.</h1>

        <!-- Search Form -->
        <div class="columns is-centered mt-5">
          <div class="column is-7">
            <div class="search-form">
              <form id="search-form">
                <div class="field has-addons has-shadow-field">
                  <div class="control has-icons-left is-expanded">
                    <input
                      type="text"
                      id="mainSearch"
                      placeholder="Search tutorials, blogs, or tools..."
                      class="input is-large"
                    />
                    <span class="icon is-small is-left">
                      <i class="fas fa-search"></i>
                    </span>
                  </div>
                  <div class="control">
                    <button type="button" class="button is-large is-primary">
                      <span class="has-text-weight-semibold">Go!</span>
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- Search Suggestions -->
        <div class="container mt-4">
          <ul class="list suggestions-list is-hidden" id="suggestions">
            <!-- Dynamic Suggestions Appear Here -->
          </ul>
        </div>
      </div>
    </div>
  </section>

  <!-- Search Results Section -->
  <section class="section">
    <div class="container">
      <div class="columns is-multiline" id="results">
        <!-- Search Results Will Be Dynamically Rendered Here -->
      </div>
    </div>
  </section>

  <!-- JavaScript -->
  <script>
    const endpoint = '{{ "/assets/search.json" | relative_url }}';
    const pages = [];

    // Fetch search data
    fetch(endpoint)
      .then((response) => response.json())
      .then((data) => pages.push(...data));

    // Find matches based on the search query
    function findMatches(query, pages) {
      return pages.filter((item) => {
        const regex = new RegExp(query, 'gi');
        return item.title.match(regex) || item.content.match(regex);
      });
    }

    // Display search results dynamically
    function displayResults() {
      const query = this.value;
      const resultsArray = findMatches(query, pages);
      const suggestionsList = document.querySelector('#suggestions');
      const resultsGrid = document.querySelector('#results');

      // Display suggestions
      // const suggestionsHtml = resultsArray
      //   .slice(0, 5)
      //   .map(
      //     (item) =>
      //       `<li>
      //         <a href="${item.url}" class="has-text-link">${item.title}</a>
      //       </li>`
      //   )
      //   .join('');
      // suggestionsList.innerHTML = suggestionsHtml;
      // suggestionsList.classList.toggle('is-hidden', query === '' || resultsArray.length === 0);

      // Display results in a grid
      const resultsHtml = resultsArray
        .map(
          (item) =>
            `<div class="column is-3">
              <div class="card">
                <div class="card-image">
                  <figure class="image is-4by3">
                    <img src="${item.image}" alt="${item.title}">
                  </figure>
                </div>
                <div class="card-content">
                  <h4 class="title is-5">
                    <a href="${item.url}" class="has-text-link">${item.title}</a>
                  </h4>
                  <p class="content">${item.description}</p>
                </div>
              </div>
            </div>`
        )
        .join('');
      resultsGrid.innerHTML =
        resultsArray.length === 0 || query === ''
          ? '<p class="has-text-centered has-text-grey">No results found.</p>'
          : resultsHtml;
    }

    // Event listeners for dynamic search functionality
    const searchInput = document.querySelector('#mainSearch');
    searchInput.addEventListener('keyup', displayResults);
    searchInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') event.preventDefault();
    });
  </script>

  <!-- CSS -->

      background-color: #f9f9f9;

    }

    .hero-body .subtitle {
      color: #4a4a4a;
    }

    .search-form {
      position: relative;
      margin: 0 auto;
    }

    .search-form .input {
      border-radius: 50px;
      padding-left: 40px;
      font-size: 1.2rem;
    }

    .search-form .button {
      border-radius: 50px;
      padding: 0 2rem;
    }

    .search-form .icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #b3b3b3;
    }

    /* Suggestions List */
    .suggestions-list {
      background: #ffffff;

      padding: 10px 15px;

  </style>
