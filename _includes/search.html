<div class="container">
    <!-- Leaderboard Ad Placeholder -->
    <div class="box has-text-centered mb-5">
      <p class="has-text-grey-light">[Leaderboard Ad]</p>
    </div>

    <!-- Search Form Section -->
    <div class="box has-shadow">
      <form id="search-form">
        <div class="field has-addons">
          <div class="control has-icons-left is-expanded">
            <input class="input is-medium" id="search" type="search" name="search" placeholder="Search for content..." autocomplete="off" />
            <span class="icon is-left"><i class="fas fa-search"></i></span>
          </div>
          <div class="control">
            <button type="button" class="button is-medium is-primary">Search</button>
          </div>
        </div>
        <div class="field">
          <ul class="list" id="list"></ul>
        </div>
      </form>
    </div>

    <!-- Bento Grid Sitemap -->
    <div class="bento-grid mt-6">
      <div class="bento-card box" style="background: #f5f5f5;">
        <h3 class="title is-5">Category 1</h3>
        <p>Explore detailed content</p>
      </div>
      <div class="bento-card box" style="background: #fafafa;">
        <h3 class="title is-5">Category 2</h3>
        <p>Guides & tutorials</p>
      </div>
      <div class="bento-card box" style="background: #ececec;">
        <h3 class="title is-5">Category 3</h3>
        <p>Latest updates</p>
      </div>
      <div class="bento-card box ad-placeholder">
        <p class="has-text-grey-light">[Ad Placeholder]</p>
      </div>
    </div>
  </div>

<script>
  const endpoint = '{{ "/assets/search.json" | relative_url }}';
  const pages = [];

  fetch(endpoint)
    .then(response => response.json())
    .then(data => pages.push(...data));

  function findResults(termToMatch, pages) {
    return pages.filter(item => new RegExp(termToMatch, 'gi').test(item.title + item.content));
  }

  function displayResults() {
    const term = this.value;
    const resultsArray = findResults(term, pages);
    const html = resultsArray.map(item => `
      <li class="item item--result">
        <article class="media box">
          <figure class="media-left">
            <p class="image is-64x64"><img src="${item.image}" alt="${item.title}" /></p>
          </figure>
          <div class="media-content">
            <h4 class="title is-5">
              <a href="${item.url}" class="has-text-link">${item.title}</a>
            </h4>
            <p class="content">${item.description}</p>
          </div>
        </article>
      </li>`).join('');
    resultsList.innerHTML = resultsArray.length ? html : '<p class="has-text-centered has-text-grey">No results found</p>';
  }

  document.querySelector('#search').addEventListener('keyup', displayResults);
</script>

<style>
  .bento-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
  }
  .bento-card {
    padding: 1.5rem;
    border-radius: 10px;
    transition: transform 0.3s ease;
  }
  .bento-card:hover {
    transform: translateY(-5px);
    box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1);
  }
  .ad-placeholder {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100px;
    background: #f8f8f8;
    border: dashed 2px #ccc;
  }
</style>
