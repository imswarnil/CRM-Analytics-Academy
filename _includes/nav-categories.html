<aside class="menu my-4">
  <p class="menu-label has-text-primary has-text-weight-bold">Categories</p>
  <ul class="menu-list">
    {% for item in site.categories %}
      <li>
        <a class="has-text-link has-text-weight-semibold" href="#{{ item | first | slugify }}">
          {{ item | first | capitalize }}
        </a>
      </li>
    {% endfor %}
  </ul>
</aside>
