<div class="course-content">
    <h1>{{ page.title }}</h1>
    <p>{{ page.overview }}</p>

    <h2>Lessons in this Section</h2>
    <ul>
      {% assign lessons = site.training | where: "parent", page.section | sort: "order" %}
      {% for lesson in lessons %}
        <li><a href="{{ lesson.url | relative_url }}">{{ lesson.title }}</a></li>
      {% endfor %}
    </ul>
  </div>
