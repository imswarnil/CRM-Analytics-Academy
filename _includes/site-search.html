<section class="section">
  <div class="container">
    <nav class="breadcrumb" aria-label="breadcrumbs">
      <ul>
        <li><a href="/">Home</a></li>
        <li class="is-active"><a href="#" aria-current="page">Search</a></li>
      </ul>
    </nav>

    <div class="columns is-variable is-8">
      <!-- Search Form Section -->
      <div class="column is-8">
        <div class="box shadow-box">
          <h1 class="title is-3 has-text-centered">Search</h1>
          <form id="search-form">
            <div class="field">
              <label class="label" for="search">Search term:</label>
              <div class="control has-icons-left">
                <input class="input is-medium" id="search" type="search" name="search" placeholder="e.g. About us" autocomplete="off" />
                <span class="icon is-left">
                  <i class="fas fa-search"></i>
                </span>
              </div>
            </div>
            <div class="field">
              <ul class="list" id="list">
                <!-- Results will be displayed here -->
              </ul>
            </div>
          </form>
        </div>
      </div>

      <!-- Sitemap Section -->
      <div class="column is-4">
        <aside class="menu">
          <p class="menu-label has-text-weight-bold has-text-primary">Sitemap</p>
          <ul class="menu-list">
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/contact">Contact</a></li>
            <li><a href="/blog">Blog</a></li>
            <li><a href="/faq">FAQ</a></li>
          </ul>
        </aside>
      </div>
    </div>
  </div>
</section>

<script type="text/javascript" src="{{ '/assets/scripts/fetch.js' | relative_url }}"></script>
<script type="text/javascript">
  const endpoint = '{{ "/assets/search.json" | relative_url }}';
  const pages = [];

  fetch(endpoint)
    .then(blob => blob.json())
    .then(data => pages.push(...data))

  function findResults(termToMatch, pages) {
    return pages.filter(item => {
      const regex = new RegExp(termToMatch, 'gi');
      return item.title.match(regex) || item.content.match(regex);
    });
  }

  function displayResults() {
    const resultsArray = findResults(this.value, pages);
    const html = resultsArray.map(item => {
      return `
        <li class="item item--result">
          <article class="article">
            <h4 class="title is-4"><a href="${item.url}">${item.title}</a></h4>
            <p>${item.description}</p>
          </article>
        </li>`;
    }).join('');
    if ((resultsArray.length == 0) || (this.value == '')) {
      resultsList.innerHTML = `<p class="has-text-centered">Sorry, nothing was found</p>`;
    } else {
      resultsList.innerHTML = html;
    }
  }

  const field = document.querySelector('#search');
  const resultsList = document.querySelector('#list');

  field.addEventListener('keyup', displayResults);

  field.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
      event.preventDefault();
    }
  });
</script>

<noscript>Please enable JavaScript to use the search form.</noscript>
