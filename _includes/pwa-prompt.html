<!-- White transparent overlay -->
<div class="overlay" id="stalker-overlay"></div>

<!-- PWA Install Modal -->
<div id="stalker-modal" class="stalker-modal box">
    <h1 class="title is-4">👀 Someone's Watching...</h1>
    <p class="subtitle is-6">Move your mouse... but you can't catch me.</p>
    <button id="install-btn" class="button is-danger is-outlined">Catch Me</button>
</div>

<script>
    let stalkerModal = document.getElementById("stalker-modal");
    let overlay = document.getElementById("stalker-overlay");
    let installButton = document.getElementById("install-btn");

    let isStalking = true; // Track if the modal should move

    // Move the modal slightly away from the cursor
    document.addEventListener("mousemove", function(event) {
        if (isStalking) {
            let x = event.clientX;
            let y = event.clientY;
            let offsetX = Math.random() * 50 - 25; // Random offset to make it unpredictable
            let offsetY = Math.random() * 50 - 25;

            stalkerModal.style.transform = `translate(${x + offsetX}px, ${y + offsetY}px)`;
            stalkerModal.classList.add("stalker-moving");
        }
    });

    // After 4 seconds, stop stalking and show the final message
    setTimeout(() => {
        isStalking = false;
        stalkerModal.classList.remove("stalker-moving");
        stalkerModal.innerHTML = `
            <h1 class="title is-3">❤️ I Love You...</h1>
            <p class="subtitle is-5">Install me forever.</p>
            <button id="real-install-btn" class="button is-danger is-medium">Install Now</button>
        `;

        // Center the modal with heartbeat effect
        stalkerModal.classList.add("stalker-active", "heartbeat");
        overlay.classList.add("overlay-active");

        // Install button event
        document.getElementById("real-install-btn").addEventListener("click", () => {
            alert("PWA Install Triggered! 🎉");
            overlay.classList.remove("overlay-active");
            stalkerModal.classList.remove("stalker-active");
        });

    }, 4000);
</script><style>
    /* Stalker modal styling */
    .stalker-modal {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.8);
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
        text-align: center;
        z-index: 1001;
        opacity: 0;
        transition: all 0.5s ease-out;
    }

    /* White transparent overlay */
    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(3px);
        opacity: 0;
        z-index: 1000;
        transition: opacity 0.5s ease-in-out;
    }

    /* When modal is active */
    .stalker-active {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }

    .overlay-active {
        opacity: 1;
    }

    /* Stalker movement effect */
    .stalker-moving {
        transition: transform 0.2s linear;
    }

    /* Heartbeat animation */
    @keyframes heartbeat {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }
    
    .heartbeat {
        animation: heartbeat 1.5s infinite;
    }
</style>
