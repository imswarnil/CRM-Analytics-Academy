---
layout: default
---

<section class="hero home-hero is-primary is-small">
  <div class="hero-body">
    <div class="container">
      <div class="columns is-vcentered">

        <!-- Left Column (Text Content) -->
        <div class="column is-5">
          <h1 class="title is-3 p-1">{{ site.hero.title }}</h1>
          <p class="subtitle is-5">{{ site.hero.description }}</p>
          <div class="buttons">
            <a href="{{ site.hero.button_primary_link }}" class="button is-primary is-rounded">
              {{ site.hero.button_primary_text }}
            </a>
            <a href="{{ site.hero.button_secondary_link }}" class="button is-light is-rounded">
              {{ site.hero.button_secondary_text }}
            </a>
          </div>

          {% if site.hero.show_students %}
          <div class="student-avatars mt-4 is-flex">
            {% for student in site.hero.student_avatars %}
              <img src="{{ student.src }}" alt="{{ student.alt }}" class="student-avatar mr-1">
            {% endfor %}
            <span class="ml-2 has-text-grey">{{ site.hero.student_text }}</span>
          </div>
          {% endif %}
        </div>

        <!-- Right Column (Hero Image) -->
        <div class="column is-auto has-text-centered">
          <figure>
            <img src="{{ site.hero.image }}" alt="{{ site.hero.title }}" class="hero-image">
          </figure>
        </div>

      </div>
    </div>
  </div>
</section>
