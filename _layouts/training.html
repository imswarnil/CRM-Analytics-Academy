---
layout: default
---

<section class="hero is-fullheight is-primary">
  <div class="hero-body">
    <div class="container">
      <div class="columns">
        <div class="column is-6">
          <h1 class="title is-1">{{ page.title }}</h1>
          <p class="subtitle is-4">{{ page.description }}</p>

          <!-- Stats List -->
          <div class="mb-6">
            <ul class="list-unstyled">
              <li class="mb-2">
                <span class="icon is-small"><i class="fe fe-clock text-warning"></i></span>
                <span>4 Hours</span>
              </li>
              <li class="mb-2">
                <span class="icon is-small"><i class="fe fe-video text-warning"></i></span>
                <span>12 Videos</span>
              </li>
              <li class="mb-2">
                <span class="icon is-small"><i class="fe fe-users text-warning"></i></span>
                <span>10,234+ Enrolled</span>
              </li>
            </ul>
          </div>
          
          <!-- Call-to-Action Button -->
          <a href="https://www.youtube.com/watch?v=aPwndqsmaGk&t=141s" class="button is-success is-large">
            Watch Preview
          </a>
        </div>

        <!-- YouTube Video Embed Section -->
        <div class="column is-6">
          <div class="card">
            <div class="card-content">
              <h2 class="title is-4">Watch Intro Video</h2>
              <div class="video-container">
                <iframe class="iframe" width="100%" height="315" src="https://www.youtube.com/embed/aPwndqsmaGk?start=141" title="CRM Analytics Training Intro" allowfullscreen></iframe>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- JSON-LD Schema for YouTube Video -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "VideoObject",
  "name": "CRM Analytics Training - Introduction",
  "description": "Learn the basics of CRM Analytics and get introduced to the course structure.",
  "thumbnailUrl": "https://img.youtube.com/vi/aPwndqsmaGk/hqdefault.jpg",
  "uploadDate": "2024-11-29",
  "duration": "PT30M",
  "contentUrl": "https://www.youtube.com/watch?v=aPwndqsmaGk",
  "embedUrl": "https://www.youtube.com/embed/aPwndqsmaGk?start=141",
  "publisher": {
    "@type": "Organization",
    "name": "CRM Analytics Academy",
    "logo": {
      "@type": "ImageObject",
      "url": "https://crmanalytics.imswarnil.com/logo.png"
    }
  }
}
</script>
