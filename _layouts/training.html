---
layout: default
---

<div class="columns is-gapless">
  <!-- Video Section -->
  <div class="column">
    <figure class="image is-16by9">
      <iframe
        class="has-ratio"
        width="640"
        height="360"
        src="{{ page.video_url }}?start={{ page.start_time }}&end={{ page.end_time }}"
        frameborder="0"
        allowfullscreen>
      </iframe>
    </figure>
  </div>

<!-- Course Navigation -->
<div class="column is-one-quarter is-scroll-column left-shadowed">
  <div class="card">
    {% for section in site.data.training.sections %}
    <header class="card-header">
      <p class="card-header-title">
        {{ section.title }}
      </p>
      <button class="button is-medium is-white" aria-label="toggle menu">
        <span class="icon">
          <i class="fas fa-angle-down" aria-hidden="true"></i>
        </span>
      </button>
    </header>
    <div class="card-content">
      <nav class="panel">
        {% for lesson in section.lessons %}
          {% assign lesson_path = lesson.slug | prepend: page.dir %}
          <a href="{{ site.baseurl }}{{ lesson_path }}/" 
             class="panel-block {% if page.url == lesson_path %} is-active {% endif %}">
            <span class="panel-icon">
              {% if page.url == lesson_path %}
                <i class="fas fa-check-circle"></i> <!-- Current Page -->
              {% else %}
                <i class="far fa-circle"></i>
              {% endif %}
            </span>
            {{ lesson.title }}
          </a>
        {% endfor %}
      </nav>
    </div>
    {% endfor %}
  </div>
</div>


</div>

  

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LearningVideo",
  "name": "{{ page.title }}",
  "description": "{{ page.description }}",
  "contentUrl": "{{ page.video_url }}",
  "timeRequired": "{{ page.end_time | minus: page.start_time }} seconds",
  "educationalLevel": "Beginner",
  "educationalUse": "Self-study"
}
</script>
