---
layout: default
---
<main class="main section">
  <div class="container">
    <div class="columns">
      <!-- Main Content -->
      <div class="column is-full">
        <article class="content">
          <header>
            <h1 class="title is-2">{{ page.title }}</h1>
          </header>
          <div class="content-body">
            {{ content }}
          </div>
        </article>
      </div>
      
      {% if page.aside == true %}
        <!-- Aside Content -->
        <aside class="column is-4">
          {% include site-aside.html %}
        </aside>
      {% endif %}
    </div>
  </div>
</main>

{% include site-footer.html %}
