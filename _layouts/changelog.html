---
layout: default
---

<div class="uk-section">
    <div class="uk-container container-xxsmall">

        <h1 class="uk-article-title">{{ page.title | escape }}</h1>

        <!-- Add Toggle Option -->
        <div class="changelog-toggle">
            <label for="toggle-checkbox">Show:</label>
            <input type="checkbox" id="toggle-checkbox" class="toggle-checkbox" checked>
            <span class="toggle-label">Most Recent First</span>
        </div>

        <div class="article-content">
            {{ content }}
        </div>

        {% assign changelogs = (site.changelogs | sort: 'date') %}
        
        <!-- Add JavaScript to Toggle Order -->
        <script>
            const toggleCheckbox = document.getElementById('toggle-checkbox');
            const toggleLabel = document.querySelector('.toggle-label');

            toggleCheckbox.addEventListener('change', function () {
                const changelogContainer = document.querySelector('.changelog-container');
                if (this.checked) {
                    changelogContainer.innerHTML = '';
                    const reversedChangelogs = [...changelogs].reverse();
                    reversedChangelogs.forEach(changelog => {
                        appendChangelog(changelog);
                    });
                    toggleLabel.textContent = 'Most Recent First';
                } else {
                    changelogContainer.innerHTML = '';
                    changelogs.forEach(changelog => {
                        appendChangelog(changelog);
                    });
                    toggleLabel.textContent = 'Most Oldest First';
                }
            });

            // Function to append a changelog
            function appendChangelog(changelog) {
                // Your existing code to append changelogs here
            }
        </script>
        
    </div>
</div>
