---
layout: default
---
<!-- Header Section -->
<header class="hero is-primary is-small">
  <div class="hero-body">
    <div class="container has-text-centered">
      <h1 class="title">{{ page.title }}</h1>
      <p class="subtitle">{{ page.description }}</p>
    </div>
  </div>
</header>

<!-- Main Content Section -->
<section class="section">
  <div class="container">
    <div class="columns">
      <!-- Main Content Column -->
      <div class="column {{ page.sidebar == true ? 'is-8' : 'is-9' }}">
        <article>
          <div class="content">
            {{ content }}
          </div>
        </article>
      </div>

      <!-- Sidebar Column (Only shown if sidebar is true) -->
      {% if page.sidebar == true %}
      <div class="column is-4">
        <!-- Sidebar Content -->
        <div class="box">
          <p class="title is-4">Related Content</p>
          <ul>
            <li><a href="#">CRM Analytics Basics</a></li>
            <li><a href="#">Salesforce AI Features</a></li>
            <li><a href="#">Top CRM Strategies</a></li>
          </ul>
        </div>
      </div>
      {% endif %}
    </div>
  </div>
</section>
