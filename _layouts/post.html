---
layout: default
---
<div data-ad-format="none"a class="hero post-hero {{ page.hero_size | default: 'is-medium' }} {{ page.hero_color | default: 'is-primary' }}">
  <div class="hero-body">
    <div class="container">
      <div class="columns is-vcentered">
        <!-- Left Content -->
        <div class="column is-7">
          <h1 class="title is-1">{{ page.title }}</h1>
          <div class="metadata mt-3">
            <span class="tag is-info">
              <i class="fas fa-folder"></i> {{ page.category | capitalize }}
            </span>
            {% for tag in page.tags %}
            <span class="tag is-light">
              <i class="fas fa-tag"></i> {{ tag }}
            </span>
            {% endfor %}
          </div>
          <div class="mt-3">
            <p>
              <i class="fas fa-clock"></i> {{ page.read_time | default: '5' }} min read
            </p>
          </div>
        </div>
        <!-- Right Image -->
        <div class="column is-5">
          <figure class="image is-square">
            <img src="{{ page.hero_image | default: 'https://via.placeholder.com/400' }}" alt="Post Image">
          </figure>
        </div>
      </div>
    </div>
  </div>
  <!-- Decorative Circles -->
  <div class="background-decorations">
    <div class="circle is-large"></div>
    <div class="circle is-small is-right"></div>
    <div class="circle is-blend"></div>
  </div>
</div>



{% include site-footer.html %}
