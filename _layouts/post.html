---
layout: default
---
<div class="hero is-medium is-fullheight blog-header">
  <div class="hero-body">
    <div class="container">
      <div class="columns is-vcentered">
        <!-- Left Column: Breadcrumb, Title, Subtitle, Category/Tags, Reading Time, Post ID -->
        <div class="column is-8">
          <!-- Breadcrumb -->
          <nav class="breadcrumb" aria-label="breadcrumbs">
            <ul>
              <li><a href="/" class="has-text-primary"><i class="fas fa-home"></i> Home</a></li>
              <li><a href="/blog" class="has-text-primary">Blog</a></li>
              <li class="is-active"><a href="#" aria-current="page" class="has-text-muted">{{ page.title }}</a></li>
            </ul>
          </nav>

          <!-- Title -->
          <h1 class="title is-2 blog-header-title">{{ page.title }}</h1>

          <!-- Subtitle -->
          <p class="subtitle is-4 blog-header-subtitle">{{ page.excerpt }}</p>

          <!-- Categories/Tags -->
          <div class="tags blog-header-tags">
            <span class="tag is-link">{{ page.categories[0] }}</span>
            <span class="tag is-info">{{ page.tags[0] }}</span>
            <span class="tag is-warning">{{ page.reading_time }} min read</span>
          </div>

          <!-- Post ID -->
          <div class="post-id-overlay">
            <span class="post-id-text">{{ page.id }}</span>
          </div>
        </div>

        <!-- Right Column: Table of Contents -->
        <div class="column is-4">
          <div class="table-of-contents">
            <h3 class="title is-4">Table of Contents</h3>
            <ul class="toc-list">
              <!-- Add dynamically generated TOC items here -->
              <li><a href="#section1">Introduction</a></li>
              <li><a href="#section2">Salesforce Evolution</a></li>
              <li><a href="#section3">AI in CRM Analytics</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Post Image -->
  <figure class="image is-16by9 blog-header-image">
    <img src="{{ page.image }}" alt="{{ page.title }}">
  </figure>
</div>
